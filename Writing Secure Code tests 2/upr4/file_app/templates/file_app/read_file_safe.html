<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Safe File Reader</title>
</head>
<body>
    <h1>Safe File Reader</h1>

    <p>Тази версия нормализира и проверява пътя до файла преди отваряне.</p>

    <form method="get" action="/read-file-safe/">
        <label for="file">Въведете име на файл:</label><br><br>
        <input type="text" id="file" name="file" placeholder="file1.txt">
        <button type="submit">Read File</button>
    </form>

    <h3>Пример за нормално извикване</h3>
    <a href="/read-file-safe/?file=file1.txt">Прочети file1.txt</a>

    <h3>Пример за атака</h3>
    <a href="/read-file-safe/?file=../manage.py">Опитай Path Traversal атака</a>

    <p><strong>Очакван резултат:</strong> Access denied</p>

    <br><br>
    <a href="/">Назад</a>
</body>
</html>
