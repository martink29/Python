<!doctype html>
<html lang="bg">
<head>
    <meta charset="utf-8">
    <title>Вход</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-card {
            background: white;
            padding: 40px;
            border-radius: 10px;
            width: 350px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 5px;
            background: #2a5298;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #1e3c72;
        }

        .error {
            color: red;
            margin-bottom: 10px;
            text-align: center;
        }

        .footer-link {
            text-align: center;
            margin-top: 15px;
        }

        .footer-link a {
            text-decoration: none;
            color: #2a5298;
        }
    </style>
</head>
<body>

<div class="login-card">
    <h2>Вход</h2>

    {% if form.errors %}
        <div class="error">
            Невалидно потребителско име или парола.
        </div>
    {% endif %}

    <form method="post">
        {% csrf_token %}

        <label for="id_username">Потребителско име</label>
        {{ form.username }}

        <label for="id_password">Парола</label>
        {{ form.password }}

        <button type="submit">Вход</button>
    </form>

    <div class="footer-link">
        <a href="{% url 'post_list' %}">← Назад към постове</a>
    </div>
</div>

</body>
</html>
